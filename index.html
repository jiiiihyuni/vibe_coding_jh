<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>재고 관리</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem;
      color: #333;
      background: #f9fafb;
    }

    h1 {
      text-align: center;
      margin-bottom: 1.5rem;
      font-size: 1.6rem;
    }

    .summary-box {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .summary-item {
      background: #fff;
      padding: 1rem;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .summary-item .label {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 0.4rem;
    }

    .summary-item .value {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .summary-item.profit .value {
      color: #16a34a;
    }

    .toolbar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .toolbar input {
      flex: 1;
      min-width: 200px;
      padding: 0.65rem 0.75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
    }

    .toolbar input:focus {
      outline: none;
      border-color: #2563eb;
    }

    .btn-export {
      background: #059669;
    }

    .btn-export:hover {
      background: #047857;
    }

    .btn-template {
      background: #7c3aed;
    }

    .btn-template:hover {
      background: #6d28d9;
    }

    .btn-import {
      background: #0891b2;
    }

    .btn-import:hover {
      background: #0e7490;
    }

    #import-file {
      display: none;
    }

    .form-box {
      background: #fff;
      padding: 1.5rem;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      margin-bottom: 1.5rem;
    }

    .form-box h2 {
      margin-top: 0;
      margin-bottom: 1rem;
      font-size: 1.1rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr auto;
      gap: 0.75rem;
      align-items: end;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 0.35rem;
    }

    input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: #2563eb;
    }

    button {
      padding: 0.65rem 1.2rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover {
      background: #1d4ed8;
    }

    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      min-width: 900px;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    }

    th, td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid #eee;
      white-space: nowrap;
    }

    th {
      background: #2563eb;
      color: #fff;
      font-weight: 600;
      font-size: 0.9rem;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: #f3f4f6;
    }

    .number {
      text-align: right;
    }

    .profit-positive {
      color: #16a34a;
      font-weight: 600;
    }

    .profit-negative {
      color: #dc2626;
      font-weight: 600;
    }

    .actions {
      display: flex;
      gap: 0.4rem;
      justify-content: center;
    }

    .btn-small {
      padding: 0.35rem 0.7rem;
      font-size: 0.85rem;
    }

    .btn-in { background: #16a34a; }
    .btn-in:hover { background: #15803d; }
    .btn-out { background: #ea580c; }
    .btn-out:hover { background: #c2410c; }
    .btn-delete { background: #dc2626; }
    .btn-delete:hover { background: #b91c1c; }

    .message {
      margin-top: 0.75rem;
      font-size: 0.9rem;
      color: #dc2626;
      min-height: 1.2rem;
    }

    .note {
      margin-top: 1rem;
      text-align: center;
      color: #666;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .empty-row td {
      text-align: center;
      color: #888;
      padding: 2rem;
    }

    @media (max-width: 700px) {
      body { padding: 0.75rem; }
      .form-row { grid-template-columns: 1fr; }
      .summary-box { grid-template-columns: 1fr; }
      .summary-item .value { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <h1>재고 관리</h1>

  <div class="summary-box">
    <div class="summary-item">
      <div class="label">전체 재고 매입액</div>
      <div class="value" id="total-buy">0원</div>
    </div>
    <div class="summary-item">
      <div class="label">전체 예상 매출</div>
      <div class="value" id="total-sell">0원</div>
    </div>
    <div class="summary-item profit">
      <div class="label">전체 예상 이익</div>
      <div class="value" id="total-profit">0원</div>
    </div>
  </div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="상품명 검색...">
    <button type="button" class="btn-template" id="template-btn">양식 다운로드</button>
    <button type="button" class="btn-import" id="import-btn">CSV 업로드</button>
    <input type="file" id="import-file" accept=".csv,text/csv">
    <button type="button" class="btn-export" id="export-btn">CSV보내기</button>
  </div>

  <div class="form-box">
    <h2>상품 추가</h2>
    <form id="add-form">
      <div class="form-row">
        <div>
          <label for="name">상품명</label>
          <input type="text" id="name" placeholder="예: 무선 마우스">
        </div>
        <div>
          <label for="quantity">수량</label>
          <input type="number" id="quantity" min="0" placeholder="0">
        </div>
        <div>
          <label for="buyPrice">매입가</label>
          <input type="number" id="buyPrice" min="0" placeholder="0">
        </div>
        <div>
          <label for="sellPrice">판매가</label>
          <input type="number" id="sellPrice" min="0" placeholder="0">
        </div>
        <div>
          <button type="submit">추가</button>
        </div>
      </div>
    </form>
    <p class="message" id="message"></p>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>상품명</th>
          <th class="number">수량</th>
          <th class="number">매입가</th>
          <th class="number">판매가</th>
          <th class="number">1개당 이익</th>
          <th class="number">이익률</th>
          <th class="number">예상 총이익</th>
          <th>관리</th>
        </tr>
      </thead>
      <tbody id="product-table"></tbody>
    </table>
  </div>

  <p class="note">
    ※ 양식 다운로드 후 엑셀에서 작성하고 CSV로 저장해 업로드하세요<br>
    ※ CSV 업로드는 기존 상품에 추가됩니다 &nbsp;|&nbsp; 데이터는 이 브라우저에 저장됩니다
  </p>

  <script>
    const STORAGE_KEY = "inventory-products";

    let products = [];
    let searchKeyword = "";

    const tableBody = document.getElementById("product-table");
    const form = document.getElementById("add-form");
    const message = document.getElementById("message");
    const searchInput = document.getElementById("search");
    const exportBtn = document.getElementById("export-btn");
    const templateBtn = document.getElementById("template-btn");
    const importBtn = document.getElementById("import-btn");
    const importFile = document.getElementById("import-file");
    const totalBuyEl = document.getElementById("total-buy");
    const totalSellEl = document.getElementById("total-sell");
    const totalProfitEl = document.getElementById("total-profit");

    function formatPrice(price) {
      return price.toLocaleString("ko-KR") + "원";
    }

    function formatPercent(value) {
      return value.toFixed(1) + "%";
    }

    function getProfitClass(value) {
      if (value > 0) return "profit-positive";
      if (value < 0) return "profit-negative";
      return "";
    }

    function calcUnitProfit(product) {
      return product.sellPrice - product.buyPrice;
    }

    function calcProfitRate(product) {
      if (product.sellPrice === 0) return 0;
      return (calcUnitProfit(product) / product.sellPrice) * 100;
    }

    function calcTotalProfit(product) {
      return product.quantity * calcUnitProfit(product);
    }

    function saveProducts() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
    }

    function loadProducts() {
      const saved = localStorage.getItem(STORAGE_KEY);

      if (saved) {
        products = JSON.parse(saved);
      } else {
        products = [
          { name: "무선 마우스", quantity: 25, buyPrice: 12000, sellPrice: 18900 },
          { name: "USB-C 케이블", quantity: 40, buyPrice: 3500, sellPrice: 7900 },
          { name: "노트북 파우치", quantity: 12, buyPrice: 15000, sellPrice: 24900 }
        ];
        saveProducts();
      }
    }

    function getFilteredProducts() {
      if (!searchKeyword) return products;

      return products.filter(function (product) {
        return product.name.toLowerCase().includes(searchKeyword.toLowerCase());
      });
    }

    function showMessage(text, duration) {
      message.textContent = text;
      setTimeout(function () {
        message.textContent = "";
      }, duration || 2000);
    }

    function toCSVRow(row) {
      return row.map(function (cell) {
        return '"' + String(cell).replace(/"/g, '""') + '"';
      }).join(",");
    }

    function downloadCSV(filename, rows) {
      const csvContent = rows.map(toCSVRow).join("\n");
      const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
      const link = document.createElement("a");

      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function downloadTemplate() {
      downloadCSV("재고_업로드_양식.csv", [
        ["상품명", "수량", "매입가", "판매가"],
        ["무선 마우스", 25, 12000, 18900]
      ]);
    }

    function parseCSV(text) {
      text = text.replace(/^\uFEFF/, "");
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const ch = text[i];

        if (inQuotes) {
          if (ch === '"') {
            if (text[i + 1] === '"') {
              cell += '"';
              i++;
            } else {
              inQuotes = false;
            }
          } else {
            cell += ch;
          }
        } else if (ch === '"') {
          inQuotes = true;
        } else if (ch === ",") {
          row.push(cell);
          cell = "";
        } else if (ch === "\n" || ch === "\r") {
          if (ch === "\r" && text[i + 1] === "\n") {
            i++;
          }
          row.push(cell);
          if (row.some(function (value) { return value.trim() !== ""; })) {
            rows.push(row);
          }
          row = [];
          cell = "";
        } else {
          cell += ch;
        }
      }

      if (cell !== "" || row.length > 0) {
        row.push(cell);
        if (row.some(function (value) { return value.trim() !== ""; })) {
          rows.push(row);
        }
      }

      return rows;
    }

    function normalizeHeader(header) {
      return header.trim().replace(/\s/g, "");
    }

    function importFromCSV(rows) {
      if (rows.length === 0) {
        throw new Error("파일에 데이터가 없습니다.");
      }

      const headers = rows[0].map(normalizeHeader);
      const nameIndex = headers.indexOf("상품명");
      const quantityIndex = headers.indexOf("수량");
      const buyPriceIndex = headers.indexOf("매입가");
      const sellPriceIndex = headers.indexOf("판매가");

      if (nameIndex === -1 || quantityIndex === -1 || buyPriceIndex === -1 || sellPriceIndex === -1) {
        throw new Error("양식이 올바르지 않습니다. 상품명, 수량, 매입가, 판매가 컬럼이 필요합니다.");
      }

      const imported = [];
      const errors = [];

      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        const name = (row[nameIndex] || "").trim();

        if (!name) {
          continue;
        }

        const quantity = Number(row[quantityIndex]);
        const buyPrice = Number(row[buyPriceIndex]);
        const sellPrice = Number(row[sellPriceIndex]);

        if (isNaN(quantity) || isNaN(buyPrice) || isNaN(sellPrice)) {
          errors.push((i + 1) + "행: 숫자 형식이 올바르지 않습니다.");
          continue;
        }

        if (quantity < 0 || buyPrice < 0 || sellPrice < 0) {
          errors.push((i + 1) + "행: 수량과 가격은 0 이상이어야 합니다.");
          continue;
        }

        imported.push({
          name: name,
          quantity: quantity,
          buyPrice: buyPrice,
          sellPrice: sellPrice
        });
      }

      if (imported.length === 0) {
        throw new Error(errors[0] || "가져올 수 있는 상품이 없습니다.");
      }

      products = products.concat(imported);
      saveProducts();
      renderTable();

      let resultMessage = imported.length + "개 상품을 추가했습니다.";
      if (errors.length > 0) {
        resultMessage += " (" + errors.length + "행 건너뜀)";
      }
      showMessage(resultMessage, 3000);
    }

    function handleImportFile(event) {
      const file = event.target.files[0];
      event.target.value = "";

      if (!file) {
        return;
      }

      const reader = new FileReader();

      reader.onload = function () {
        try {
          const rows = parseCSV(reader.result);
          importFromCSV(rows);
        } catch (error) {
          showMessage(error.message);
        }
      };

      reader.onerror = function () {
        showMessage("파일을 읽을 수 없습니다.");
      };

      reader.readAsText(file, "UTF-8");
    }

    function updateSummary() {
      let totalBuy = 0;
      let totalSell = 0;
      let totalProfit = 0;

      products.forEach(function (product) {
        totalBuy += product.quantity * product.buyPrice;
        totalSell += product.quantity * product.sellPrice;
        totalProfit += calcTotalProfit(product);
      });

      totalBuyEl.textContent = formatPrice(totalBuy);
      totalSellEl.textContent = formatPrice(totalSell);
      totalProfitEl.textContent = formatPrice(totalProfit);
      totalProfitEl.className = "value " + getProfitClass(totalProfit);
    }

    function changeQuantity(index, amount) {
      const product = products[index];
      const newQuantity = product.quantity + amount;

      if (newQuantity < 0) {
        showMessage("수량이 0 미만이 될 수 없습니다.");
        return;
      }

      product.quantity = newQuantity;
      saveProducts();
      renderTable();
    }

    function deleteProduct(index) {
      const productName = products[index].name;

      if (confirm('"' + productName + '" 상품을 삭제할까요?')) {
        products.splice(index, 1);
        saveProducts();
        renderTable();
      }
    }

    function exportCSV() {
      if (products.length === 0) {
        showMessage("내보낼 상품이 없습니다.");
        return;
      }

      const headers = ["상품명", "수량", "매입가", "판매가", "1개당이익", "이익률(%)", "예상총이익"];
      const rows = products.map(function (product) {
        return [
          product.name,
          product.quantity,
          product.buyPrice,
          product.sellPrice,
          calcUnitProfit(product),
          calcProfitRate(product).toFixed(1),
          calcTotalProfit(product)
        ];
      });

      const today = new Date().toISOString().slice(0, 10);
      downloadCSV("재고목록_" + today + ".csv", [headers].concat(rows));
    }

    function renderTable() {
      const filtered = getFilteredProducts();
      tableBody.innerHTML = "";

      if (filtered.length === 0) {
        const row = document.createElement("tr");
        row.className = "empty-row";
        row.innerHTML = '<td colspan="8">검색 결과가 없습니다.</td>';
        tableBody.appendChild(row);
        updateSummary();
        return;
      }

      filtered.forEach(function (product) {
        const index = products.indexOf(product);
        const unitProfit = calcUnitProfit(product);
        const profitRate = calcProfitRate(product);
        const totalProfit = calcTotalProfit(product);

        const row = document.createElement("tr");
        row.innerHTML =
          "<td>" + product.name + "</td>" +
          '<td class="number">' + product.quantity + "</td>" +
          '<td class="number">' + formatPrice(product.buyPrice) + "</td>" +
          '<td class="number">' + formatPrice(product.sellPrice) + "</td>" +
          '<td class="number ' + getProfitClass(unitProfit) + '">' + formatPrice(unitProfit) + "</td>" +
          '<td class="number ' + getProfitClass(profitRate) + '">' + formatPercent(profitRate) + "</td>" +
          '<td class="number ' + getProfitClass(totalProfit) + '">' + formatPrice(totalProfit) + "</td>" +
          '<td class="actions">' +
            '<button class="btn-small btn-in" data-action="in" data-index="' + index + '">+</button>' +
            '<button class="btn-small btn-out" data-action="out" data-index="' + index + '">−</button>' +
            '<button class="btn-small btn-delete" data-action="delete" data-index="' + index + '">삭제</button>' +
          "</td>";
        tableBody.appendChild(row);
      });

      updateSummary();
    }

    searchInput.addEventListener("input", function () {
      searchKeyword = searchInput.value.trim();
      renderTable();
    });

    templateBtn.addEventListener("click", downloadTemplate);
    importBtn.addEventListener("click", function () {
      importFile.click();
    });
    importFile.addEventListener("change", handleImportFile);
    exportBtn.addEventListener("click", exportCSV);

    tableBody.addEventListener("click", function (event) {
      const button = event.target.closest("button");
      if (!button) return;

      const index = Number(button.dataset.index);
      const action = button.dataset.action;

      if (action === "in") {
        changeQuantity(index, 1);
      } else if (action === "out") {
        changeQuantity(index, -1);
      } else if (action === "delete") {
        deleteProduct(index);
      }
    });

    form.addEventListener("submit", function (event) {
      event.preventDefault();
      message.textContent = "";

      const name = document.getElementById("name").value.trim();
      const quantity = Number(document.getElementById("quantity").value);
      const buyPrice = Number(document.getElementById("buyPrice").value);
      const sellPrice = Number(document.getElementById("sellPrice").value);

      if (!name) {
        message.textContent = "상품명을 입력해 주세요.";
        return;
      }

      if (quantity < 0 || buyPrice < 0 || sellPrice < 0) {
        message.textContent = "수량과 가격은 0 이상이어야 합니다.";
        return;
      }

      products.push({ name: name, quantity: quantity, buyPrice: buyPrice, sellPrice: sellPrice });
      saveProducts();
      renderTable();

      form.reset();
      document.getElementById("name").focus();
    });

    loadProducts();
    renderTable();
  </script>
</body>
</html>
